<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Productos - Jugos</title>
    <link rel="stylesheet" href="../../styles/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <!-- HEADER -->
        <header class="admin-header">
            <h1>Panel de Administración</h1>
            <p>Gestiona tus jugos naturales</p>
        </header>

        <div class="admin-layout">
            
            <!-- FORMULARIO PARA AGREGAR PRODUCTO -->
            <section class="form-section">
                <div class="card">
                    <h2 class="section-title">Agregar Nuevo Jugo</h2>

                    <form class="form-producto" id="formProducto">
                        
                        <!-- Imagen del producto -->
                        <div class="form-group imagen-group">
                            <label for="inputImagen">Imagen del jugo:</label>
                            <input type="file" id="inputImagen" class="input-imagen" accept="image/*">
                            <div class="preview" id="previewImagen">
                                <p>Vista previa de la imagen</p>
                            </div>
                        </div>

                        <!-- Nombre del producto -->
                        <div class="form-group">
                            <label for="inputNombre">Nombre del jugo:</label>
                            <input type="text" id="inputNombre" class="input-nombre" placeholder="Ej: Jugo de Naranja Fresca" required>
                        </div>

                        <!-- Descripción -->
                        <div class="form-group">
                            <label for="inputDescripcion">Descripción:</label>
                            <input type="text" id="inputDescripcion" class="input-descripcion" placeholder="Ej: Recién exprimido, lleno de vitamina C" required>
                        </div>

                        <!-- Precio -->
                        <div class="form-group">
                            <label for="inputPrecio">Precio ($):</label>
                            <input type="number" id="inputPrecio" class="input-precio" min="0" step="0.01" placeholder="Ej: 4.99" required>
                        </div>

                        <!-- Categoría -->
                        <div class="form-group">
                            <label for="selectCategoria">Categoría:</label>
                            <select id="selectCategoria" class="select-categoria" required>
                                <option value="">Selecciona una categoría</option>
                                <option value="Bebidas">Bebidas</option>
                                <option value="Comida">Comida</option>
                                <option value="Postres">Postres</option>
                            </select>
                        </div>

                        <!-- Rating -->
                        <div class="form-group">
                            <label for="inputRating">Rating (1-5):</label>
                            <input type="number" id="inputRating" class="input-rating" min="1" max="5" step="0.1" placeholder="Ej: 4.5" required>
                        </div>

                        <!-- Número de reseñas -->
                        <div class="form-group">
                            <label for="inputResenas">Número de reseñas:</label>
                            <input type="number" id="inputResenas" class="input-resenas" min="0" placeholder="Ej: 203" required>
                        </div>

                        <!-- Estado -->
                        <div class="form-group">
                            <label for="selectEstado">Estado:</label>
                            <select id="selectEstado" class="select-estado">
                                <option value="normal">Normal</option>
                                <option value="nuevo">Nuevo</option>
                                <option value="bestseller">Bestseller</option>
                                <option value="oferta">Oferta</option>
                            </select>
                        </div>

                        <!-- Botones -->
                        <div class="form-buttons">
                            <button type="submit" class="btn-guardar" id="btnGuardar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                    <polyline points="7 3 7 8 15 8"></polyline>
                                </svg>
                                Guardar Producto
                            </button>
                            <button type="button" class="btn-cancelar" id="btnCancelar">Cancelar</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- LISTA DE PRODUCTOS -->
            <section class="lista-section">
                <div class="card">
                    <h2 class="section-title">Productos Registrados</h2>
                    
                    <div class="filtros-rapidos">
                        <button class="filtro-rapido active" data-filtro="todos">Todos</button>
                        <button class="filtro-rapido" data-filtro="Bebidas">Bebidas</button>
                        <button class="filtro-rapido" data-filtro="Comida">Comidas</button>
                        <button class="filtro-rapido" data-filtro="Postres">Postres</button>
                    </div>

                    <div class="productos-lista" id="productosLista">
                        <!-- Aquí se mostrarán los productos agregados -->
                        <div class="empty-state">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                            <p>No hay productos registrados aún</p>
                            <small>Agrega tu primer jugo natural</small>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <!-- NOTIFICACIÓN -->
    <div class="notificacion" id="notificacion">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span id="notificacionTexto">Producto guardado exitosamente</span>
    </div>


    <script type="module" src='../../app/pages/productos.js'></script>

</body>
</html>
